services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://forge:forge@postgres:5432/forge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FEATURE_OOBABOOGA: ${FEATURE_OOBABOOGA:-false}
      DEFAULT_INFERENCE_BACKEND: ${DEFAULT_INFERENCE_BACKEND:-vllm}
      DEFAULT_INFERENCE_BASE_URL: ${DEFAULT_INFERENCE_BASE_URL:-http://host.docker.internal:8001/v1}
      DEFAULT_INFERENCE_API_KEY: ${DEFAULT_INFERENCE_API_KEY:-local-key}
      ALL_LOCAL_MODE: ${ALL_LOCAL_MODE:-true}
    ports:
      - "${FORGE_API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/backend
    command: ["dramatiq", "app.workers.runner"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://forge:forge@postgres:5432/forge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FEATURE_OOBABOOGA: ${FEATURE_OOBABOOGA:-false}
      DEFAULT_INFERENCE_BACKEND: ${DEFAULT_INFERENCE_BACKEND:-vllm}
      DEFAULT_INFERENCE_BASE_URL: ${DEFAULT_INFERENCE_BASE_URL:-http://host.docker.internal:8001/v1}
      DEFAULT_INFERENCE_API_KEY: ${DEFAULT_INFERENCE_API_KEY:-local-key}
      ALL_LOCAL_MODE: ${ALL_LOCAL_MODE:-true}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./apps/frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${FORGE_API_PORT:-8000}
    ports:
      - "${FORGE_WEB_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
